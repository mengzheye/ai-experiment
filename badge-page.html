<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badge Earned</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      color: #1a1a1a;
    }

    /* Painterly landscape background */
    .scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: url('background.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* Floating celebration elements */
    .celebrate {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }
    .float-item {
      position: absolute;
      animation: float 6s ease-in-out infinite;
    }
    .float-item.f1 { top: 12%; left: 8%; animation-delay: 0s; }
    .float-item.f2 { top: 18%; right: 10%; animation-delay: 1s; }
    .float-item.f3 { top: 55%; left: 5%; animation-delay: 2s; }
    .float-item.f4 { top: 60%; right: 6%; animation-delay: 0.5s; }
    .float-item.f5 { top: 30%; left: 15%; animation-delay: 1.5s; }
    .float-item.f6 { top: 25%; right: 20%; animation-delay: 2.5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(8deg); }
    }

    /* Main content */
    .container {
      position: relative;
      z-index: 2;
      max-width: 440px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    .top-banner {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .top-banner .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: white;
      color: #1a1a1a;
      padding: 0.45rem 1rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      box-shadow: 0 4px 0 rgba(0,0,0,0.15);
    }
    .top-banner h1 {
      font-size: 2.4rem;
      font-weight: 900;
      color: white;
      margin-top: 1rem;
      line-height: 1.1;
      text-shadow: 0 3px 0 rgba(0,0,0,0.25);
      letter-spacing: -0.01em;
    }
    .top-banner .subtitle {
      color: white;
      font-size: 1rem;
      font-weight: 600;
      margin-top: 0.5rem;
      text-shadow: 0 2px 0 rgba(0,0,0,0.2);
      opacity: 0.95;
    }

    /* Badge clipboard card — matches brand card style */
    .badge-card {
      background: #FFD84D;
      border-radius: 22px;
      padding: 1.25rem 1.25rem 1.5rem;
      position: relative;
      box-shadow: 0 10px 0 rgba(0,0,0,0.15), 0 20px 40px rgba(0,0,0,0.25);
      animation: cardIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes cardIn {
      0% { transform: scale(0.7) translateY(40px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    /* Clipboard tab on top */
    .clip-tab {
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      width: 56px;
      height: 44px;
      background: #E89B2B;
      border-radius: 6px 6px 10px 10px;
      box-shadow: inset 0 -6px 0 rgba(0,0,0,0.15);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 6px;
    }
    .clip-tab::before {
      content: '';
      width: 30px;
      height: 8px;
      background: #C67A1A;
      border-radius: 3px;
    }

    .card-title {
      text-align: center;
      font-size: 1.15rem;
      font-weight: 800;
      color: #1a1a1a;
      margin: 1rem 0 0.75rem;
    }

    /* Stats row mimicking brand badge counters */
    .stats {
      display: flex;
      justify-content: center;
      gap: 0.4rem;
      background: white;
      border-radius: 999px;
      padding: 0.4rem 0.75rem;
      width: fit-content;
      margin: 0 auto 1rem;
      font-size: 0.85rem;
      font-weight: 800;
    }
    .stat {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0 0.3rem;
    }
    .stat-icon {
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
    }

    /* Badge visual — grey placeholder */
    .badge-visual {
      background: #EAF4FF;
      border-radius: 16px;
      aspect-ratio: 1.1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .badge-placeholder {
      width: 62%;
      aspect-ratio: 1;
      background: #C4C4C4;
      border-radius: 50%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 0 0 6px white,
        0 0 0 10px #C4C4C4,
        0 12px 0 rgba(0,0,0,0.12);
    }
    .badge-placeholder::before {
      content: '';
      position: absolute;
      inset: 16%;
      border: 3px dashed #9a9a9a;
      border-radius: 50%;
    }
    .badge-placeholder::after {
      content: 'BADGE';
      font-size: 0.8rem;
      font-weight: 900;
      color: #6b6b6b;
      letter-spacing: 0.12em;
    }
    /* Rays behind badge */
    .rays {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 0;
    }
    .rays svg { width: 100%; height: 100%; }

    /* Info block */
    .badge-info {
      background: white;
      border-radius: 14px;
      padding: 1rem 1.1rem 1.1rem;
      margin-top: 0.9rem;
    }
    .badge-name {
      font-size: 1.2rem;
      font-weight: 900;
      color: #1a1a1a;
      margin-bottom: 0.3rem;
    }
    .badge-desc {
      font-size: 0.9rem;
      font-weight: 600;
      color: #5a5a5a;
      line-height: 1.4;
    }

    /* CTAs */
    .actions {
      margin-top: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }
    .btn {
      width: 100%;
      padding: 1rem 1.2rem;
      border-radius: 999px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      border: none;
      transition: transform 0.15s ease;
    }
    .btn:active { transform: translateY(2px); }
    .btn-primary {
      background: #1a1a1a;
      color: white;
      box-shadow: 0 5px 0 #000;
    }
    .btn-secondary {
      background: white;
      color: #1a1a1a;
      box-shadow: 0 5px 0 rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

  <!-- Painterly landscape -->
  <div class="scene"></div>
  <!-- Floating celebration -->
  <div class="celebrate">
    <div class="float-item f1">
      <svg width="40" height="40" viewBox="0 0 40 40"><path d="M20 3 L24 15 L37 15 L26 23 L30 35 L20 28 L10 35 L14 23 L3 15 L16 15 Z" fill="#FFD84D" stroke="#1a1a1a" stroke-width="2" stroke-linejoin="round"/></svg>
    </div>
    <div class="float-item f2">
      <svg width="36" height="36" viewBox="0 0 36 36"><circle cx="18" cy="18" r="14" fill="#FF6B9D" stroke="#1a1a1a" stroke-width="2"/><circle cx="18" cy="18" r="6" fill="white"/></svg>
    </div>
    <div class="float-item f3">
      <svg width="34" height="50" viewBox="0 0 34 50"><path d="M19 2 L4 28 L15 28 L10 48 L30 20 L19 20 Z" fill="#4A90E2" stroke="#1a1a1a" stroke-width="2" stroke-linejoin="round"/></svg>
    </div>
    <div class="float-item f4">
      <svg width="42" height="40" viewBox="0 0 42 40"><path d="M21 35 C21 35 4 24 4 13 C4 7 9 3 15 3 C18 3 21 6 21 9 C21 6 24 3 27 3 C33 3 38 7 38 13 C38 24 21 35 21 35 Z" fill="#FF6B6B" stroke="#1a1a1a" stroke-width="2" stroke-linejoin="round"/></svg>
    </div>
    <div class="float-item f5">
      <svg width="32" height="32" viewBox="0 0 32 32"><path d="M16 4 L16 28 M4 16 L28 16" stroke="white" stroke-width="4" stroke-linecap="round"/></svg>
    </div>
    <div class="float-item f6">
      <svg width="38" height="38" viewBox="0 0 38 38"><circle cx="19" cy="19" r="15" fill="#9B6BE6" stroke="#1a1a1a" stroke-width="2"/><path d="M19 10 L21 17 L28 17 L22 21 L24 28 L19 24 L14 28 L16 21 L10 17 L17 17 Z" fill="white"/></svg>
    </div>
  </div>

  <div class="container">
    <div class="top-banner">
      <span class="eyebrow">🎉 Badge Earned</span>
      <h1>You did it!</h1>
      <p class="subtitle">Another climb under your belt.</p>
    </div>

    <div class="badge-card">
      <div class="clip-tab"></div>

      <div class="card-title">Milestone Achieved</div>

      <div class="stats">
        <div class="stat"><span class="stat-icon">⭐</span><span>1</span></div>
        <div class="stat"><span class="stat-icon">❤️</span><span>3</span></div>
        <div class="stat"><span class="stat-icon">👍</span><span>6</span></div>
        <div class="stat"><span class="stat-icon">📅</span><span>Today</span></div>
      </div>

      <div class="badge-visual">
        <div class="rays">
          <svg viewBox="0 0 200 200">
            <g stroke="#FFD84D" stroke-width="6" stroke-linecap="round" opacity="0.6">
              <line x1="100" y1="10" x2="100" y2="30"/>
              <line x1="100" y1="170" x2="100" y2="190"/>
              <line x1="10" y1="100" x2="30" y2="100"/>
              <line x1="170" y1="100" x2="190" y2="100"/>
              <line x1="30" y1="30" x2="45" y2="45"/>
              <line x1="155" y1="155" x2="170" y2="170"/>
              <line x1="170" y1="30" x2="155" y2="45"/>
              <line x1="30" y1="170" x2="45" y2="155"/>
            </g>
          </svg>
        </div>
        <div class="badge-placeholder"></div>
      </div>

      <div class="badge-info">
        <div class="badge-name">Cluster Complete</div>
        <div class="badge-desc">You finished the Education &amp; Training cluster. That's 3 Hats down — keep climbing!</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary">Share my badge</button>
      <button class="btn btn-secondary">Back to Climbs</button>
    </div>
  </div>

</body>
</html>
